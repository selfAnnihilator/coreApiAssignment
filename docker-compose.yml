version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: grid07_postgres
    environment:
      POSTGRES_DB: grid07db
      POSTGRES_USER: grid07
      POSTGRES_PASSWORD: grid07pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grid07 -d grid07db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: grid07_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
